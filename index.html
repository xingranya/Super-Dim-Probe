    <style>
      body {
        background-color: #020405;
        color: #c9d1d9;

      /* Remove global overflow: hidden and touch-action: none */

        border-top-color: #58a6ff;
        border-radius: 50%;

      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loader-text {
        margin-top: 20px;
        color: #58a6ff;
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.8;
